# Vellum
# Full stack: docker compose --profile app up -d
# Dev infra:  docker compose up redis keycloak -d

services:
  be:
    image: ghcr.io/michalwilk/vellum-be:latest
    profiles: [app]
    volumes:
      - ./config.toml:/app/config.toml:ro,z
      - ./vaults:/app/vaults:ro,z
    environment:
      - VELLUM__AUTH__MODE=${AUTH_MODE:-oidc}
      - VELLUM__AUTH__OIDC__ISSUER_URL=http://keycloak:8080/realms/vellum
      - VELLUM__AUTH__OIDC__PUBLIC_ISSUER_URL=http://localhost:${KC_PORT:-8080}/realms/vellum
      - VELLUM__AUTH__OIDC__REDIRECT_URL=http://localhost:${PORT:-7000}/api/auth/callback
      - VELLUM__AUTH__OIDC__FRONTEND_URL=http://localhost:${PORT:-7000}
      - VELLUM__AUTH__OIDC__CLIENT_ID=vellum
      - VELLUM__AUTH__OIDC__CLIENT_SECRET=${CLIENT_SECRET:-dev-secret}
      - VELLUM__AUTH__OIDC__SESSION__REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      - VELLUM__AUTH__OIDC__SESSION__COOKIE_NAME=vellum_session
      - VELLUM__AUTH__OIDC__SESSION__COOKIE_SECURE=false
      - VELLUM__AUTH__WEBHOOK_SECRET=${WEBHOOK_SECRET}
    depends_on:
      redis:
        condition: service_started
      keycloak:
        condition: service_healthy
    restart: unless-stopped

  fe:
    image: ghcr.io/michalwilk/vellum-fe:latest
    profiles: [app]
    environment:
      - ORIGIN=http://localhost:${PORT:-7000}
      - BACKEND_URL=http://be:3000
      - BODY_SIZE_LIMIT=0
    ports:
      - "${PORT:-7000}:3001"
    depends_on:
      - be
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm --health-enabled=true
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KC_ADMIN_USER:-admin}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KC_ADMIN_PASSWORD:-changeme}
    volumes:
      - ./deploy/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro,z
    ports:
      - "${KC_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

volumes:
  redis_data:
